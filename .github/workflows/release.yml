name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}

permissions: {}

jobs:
  release:
    if: github.repository_owner == 'DrSkillIssue'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - run: bun run build

      - run: bun run test

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          for pkg in packages/ganko packages/lsp; do
            NAME=$(node -p "require('./$pkg/package.json').name")
            VERSION=$(node -p "require('./$pkg/package.json').version")
            PUBLISHED=$(npm view "$NAME@$VERSION" version 2>/dev/null || echo "")
            if [ "$PUBLISHED" = "$VERSION" ]; then
              echo "$NAME@$VERSION already published, skipping"
            else
              echo "Publishing $NAME@$VERSION"
              cd "$pkg" && npm publish --access public --provenance && cd -
            fi
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Publish VS Code Extension
        continue-on-error: true
        run: bun run --cwd packages/vscode publish:vsce
        env:
          VSCE_PAT: ${{ secrets.VSCE_TOKEN }}

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p' || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          # Generate categorized notes from conventional commits
          {
            echo "notes<<RELEASE_EOF"

            # Core (feat/fix without scope, or scope=ganko/core/engine)
            CORE=$(git log "$RANGE" --pretty=format:'%s' --no-merges | grep -E '^(feat|fix|perf|refactor)(\(ganko\)|\(core\)|\(engine\))?:' | sed 's/^[a-z]*\([^)]*\): //' || true)
            if [ -n "$CORE" ]; then
              echo "## Core"
              echo "$CORE" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # LSP
            LSP=$(git log "$RANGE" --pretty=format:'%s' --no-merges | grep -E '^(feat|fix|perf|refactor)\(lsp\):' | sed 's/^[a-z]*([^)]*): //' || true)
            if [ -n "$LSP" ]; then
              echo "## LSP"
              echo "$LSP" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # CSS
            CSS=$(git log "$RANGE" --pretty=format:'%s' --no-merges | grep -E '^(feat|fix|perf|refactor)\(css\):' | sed 's/^[a-z]*([^)]*): //' || true)
            if [ -n "$CSS" ]; then
              echo "## CSS"
              echo "$CSS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # VS Code Extension
            VSCODE=$(git log "$RANGE" --pretty=format:'%s' --no-merges | grep -E '^(feat|fix|perf|refactor)\(vscode\):' | sed 's/^[a-z]*([^)]*): //' || true)
            if [ -n "$VSCODE" ]; then
              echo "## VS Code Extension"
              echo "$VSCODE" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # CI / Chores (optional, collapsed)
            INFRA=$(git log "$RANGE" --pretty=format:'%s' --no-merges | grep -E '^(ci|chore|build|docs):' | sed 's/^[a-z]*\([^)]*\)\?: //' || true)
            if [ -n "$INFRA" ]; then
              echo "## Infrastructure"
              echo "$INFRA" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "${{ steps.notes.outputs.notes }}" \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
