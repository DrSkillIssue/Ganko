name: Setup
description: Install Bun and project dependencies

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "24"

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.10"

    - run: bun install --frozen-lockfile
      shell: bash
