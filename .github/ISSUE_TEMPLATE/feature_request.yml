name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: checkboxes
    id: verified
    attributes:
      label: This feature hasn't been requested before.
      options:
        - label: I have searched existing issues and confirmed this hasn't been requested.
          required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - ganko
        - "@ganko/lsp"
        - "@ganko/shared"
        - ganko-vscode
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want and why?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered or workarounds you're using.
    validations:
      required: false
